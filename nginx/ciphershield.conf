# CipherShield — Nginx configuration
# Domain: ciphershield.securespherelabs.com
# Replace SSL paths with certbot output after running:
#   certbot --nginx -d ciphershield.securespherelabs.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ciphershield.securespherelabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ciphershield.securespherelabs.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ciphershield.securespherelabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ciphershield.securespherelabs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "no-referrer" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none';"
        always;

    # ── Root: serve landing page as static files ──────────────────────────
    root /var/www/ciphershield/landing;
    index index.html;

    # ── Gzip: static assets only ─────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Landing page ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Submission form ───────────────────────────────────────────────────
    location /submission/ {
        alias /var/www/ciphershield/submission/;
        try_files $uri $uri/ /submission/index.html;
    }

    # ── Agency portal (React SPA) ─────────────────────────────────────────
    location /portal/ {
        alias /var/www/ciphershield/portal/;
        try_files $uri $uri/ /portal/index.html;
    }

    # ── API: submit and status — NO access logging (privacy guarantee) ────
    location /api/submit {
        access_log off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        # Do NOT forward X-Real-IP or X-Forwarded-For — the backend anonymize
        # middleware deletes them, but defence-in-depth means we never send them.
        proxy_set_header   X-Real-IP "";
        proxy_set_header   X-Forwarded-For "";
        proxy_set_header   X-Forwarded-Proto "";
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        client_max_body_size 32k;
    }

    location /api/status {
        access_log off;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP "";
        proxy_set_header   X-Forwarded-For "";
        proxy_set_header   X-Forwarded-Proto "";
        proxy_read_timeout 10s;
    }

    # ── Agency API — standard logging (user ID only, no reporter data) ────
    location /api/agency/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP "";
        proxy_set_header   X-Forwarded-For "";
        proxy_read_timeout 30s;
        client_max_body_size 64k;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
    }

    # ── Block dot-files and hidden paths ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
